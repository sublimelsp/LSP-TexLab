[tool.pyright]
pythonVersion = '3.8'

[tool.ruff]
target-version = 'py38'
line-length = 120

[tool.ruff.lint]
# Enable preview rules.
preview = true
select = ["F401", "I"]

[tool.ruff.lint.isort]
case-sensitive = true
combine-as-imports = true
order-by-type = false
required-imports = ["from __future__ import annotations"]
